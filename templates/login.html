<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Costa Bella</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #00b2ca;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Ondas decorativas de fundo */
        body::before {
            content: '';
            position: absolute;
            bottom: -60px;
            left: -60px;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
        }

        body::after {
            content: '';
            position: absolute;
            top: -80px;
            right: -80px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        /* Faixa superior colorida */
        .card-top-bar {
            height: 5px;
            background: linear-gradient(90deg, #1d4e89, #00b2ca, #7dcfb6);
        }

        .card-header {
            padding: 36px 36px 24px;
            border-bottom: 1px solid #f0f0f0;
        }

        .logo-mark {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #1d4e89;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
        }

        .logo-mark i {
            color: #f79256;
            font-size: 22px;
        }

        .card-header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #1d4e89;
            margin-bottom: 5px;
        }

        .card-header p {
            font-size: 14px;
            color: #888;
        }

        .card-body {
            padding: 28px 36px 36px;
        }

        /* Mensagens flash */
        .flash-msg {
            background: #fff5f0;
            border-left: 3px solid #f79256;
            color: #c0392b;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .field-group {
            margin-bottom: 18px;
        }

        .field-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 7px;
        }

        .field-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .field-wrap .field-icon {
            position: absolute;
            left: 13px;
            color: #00b2ca;
            font-size: 15px;
            pointer-events: none;
        }

        .field-wrap input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border: 1.5px solid #e8e8e8;
            border-radius: 10px;
            font-size: 15px;
            color: #333;
            background: #fafafa;
            outline: none;
            transition: border-color 0.25s, background 0.25s;
        }

        .field-wrap input:focus {
            border-color: #00b2ca;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(0,178,202,0.12);
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: #f79256;
            color: #1d4e89;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 24px;
            transition: background 0.25s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background: #e07d40;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 22px 0 18px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #f0f0f0;
        }

        .divider span {
            font-size: 12px;
            color: #bbb;
        }

        .link-row {
            text-align: center;
            font-size: 14px;
            color: #888;
        }

        .link-row a {
            color: #1d4e89;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .link-row a:hover {
            color: #00b2ca;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-top-bar"></div>
        <div class="card-header">
            <div class="logo-mark">
                <i class="fa-solid fa-umbrella-beach"></i>
            </div>
            <h1>Bem-vindo de volta</h1>
            <p>Acesse sua conta Costa Bella</p>
        </div>
        <div class="card-body">

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="flash-msg">
                  {% for message in messages %}
                    <p>{{ message }}</p>
                  {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">

                <div class="field-group">
                    <label for="usuario">Usuário</label>
                    <div class="field-wrap">
                        <i class="fa-solid fa-user field-icon"></i>
                        <input type="text" id="usuario" name="usuario" placeholder="seu_usuario" required autocomplete="username">
                    </div>
                </div>

                <div class="field-group">
                    <label for="senha">Senha</label>
                    <div class="field-wrap">
                        <i class="fa-solid fa-lock field-icon"></i>
                        <input type="password" id="senha" name="senha" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    Entrar
                </button>
            </form>

            <div class="divider"><span>ou</span></div>
            <div class="link-row">
                Não tem conta? <a href="{{ url_for('cadastro') }}">Cadastre-se</a>
            </div>
        </div>
    </div>

</body>
</html>
